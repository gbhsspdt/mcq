<!DOCTYPE html>
<html lang="ta">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>அரசு ஆண்கள் மேனிலைப் பள்ளி - ஒரு மதிப்பெண் வினாத்தேர்வு</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+Thambi+2:wght@500;600;700;800&family=Noto+Sans+Tamil:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-deep:#05010f;
    --bg-deep2:#0d0620;
    --star-white:#e8f2ff;
    --accent-cyan:#22d3ee;
    --accent-pink:#f472b6;
    --accent-amber:#fbbf24;
    --accent-green:#34d399;
    --accent-red:#fb7185;
    --accent-violet:#8b5cf6;
    --accent-teal:#2dd4bf;
    --text-light:#f1f5f9;
    --text-muted:#8b93ad;
    --font-display:'Baloo Thambi 2', 'Poppins', sans-serif;
    --font-tamil:'Noto Sans Tamil', sans-serif;
    --font-en:'Poppins', sans-serif;
  }

  *{ box-sizing:border-box; }

  body{
    margin:0;
    min-height:100vh;
    font-family:var(--font-tamil);
    color:var(--text-light);
    background:
      radial-gradient(ellipse at 50% 0%, rgba(139,92,246,0.18), transparent 55%),
      radial-gradient(ellipse at 50% 100%, rgba(34,211,238,0.12), transparent 55%),
      linear-gradient(180deg, var(--bg-deep), var(--bg-deep2));
    position:relative;
    overflow-x:hidden;
    padding:24px 12px 50px;
  }

  #starfield{ position:fixed; inset:0; z-index:0; pointer-events:none; }
  .star{
    position:absolute;
    width:2px; height:2px;
    background:var(--star-white);
    border-radius:50%;
    animation:twinkle linear infinite;
  }
  @keyframes twinkle{
    0%,100%{ opacity:0.15; }
    50%{ opacity:0.9; }
  }

  @keyframes fadeUp{
    from{ opacity:0; transform:translateY(16px); }
    to{ opacity:1; transform:translateY(0); }
  }
  @keyframes shimmer{
    0%{ background-position:-200% center; }
    100%{ background-position:200% center; }
  }
  @keyframes hubPulse{
    0%,100%{ filter:drop-shadow(0 0 10px rgba(34,211,238,0.6)); }
    50%{ filter:drop-shadow(0 0 26px rgba(139,92,246,0.75)); }
  }
  @keyframes dashFlow{
    to{ stroke-dashoffset:-40; }
  }
  @keyframes nodeIn{
    from{ opacity:0; transform:scale(0.3); }
    to{ opacity:1; transform:scale(1); }
  }

  .container{ max-width:1080px; margin:auto; position:relative; z-index:1; }

  /* ---------- HEADER ---------- */
  .school-header{ text-align:center; padding:20px 20px 10px; animation:fadeUp 0.7s ease both; }
  .govt-logo{
    display:block;
    width:84px; height:84px;
    object-fit:contain;
    margin:0 auto 10px;
    filter:drop-shadow(0 0 14px rgba(255,255,255,0.25));
  }
  .school-header h1.school-name{ font-family:var(--font-tamil); font-size:21px; font-weight:700; margin:4px 0; }
  .school-header h2.school-sub{ font-family:var(--font-tamil); font-size:14px; font-weight:500; color:var(--text-muted); margin:2px 0; }
  .title-divider{
    height:2px; width:110px; margin:14px auto; border-radius:2px;
    background:linear-gradient(90deg, var(--accent-cyan), var(--accent-pink), var(--accent-amber));
    background-size:200% auto; animation:shimmer 4s linear infinite;
  }
  .portal-title{
    font-family:var(--font-tamil); font-size:18px; font-weight:600; text-align:center;
    max-width:640px; margin:6px auto 2px; line-height:1.7;
  }
  .portal-sub{ text-align:center; color:var(--text-muted); font-size:12px; font-family:var(--font-en); letter-spacing:0.8px; margin-bottom:4px; text-transform:uppercase; }

  /* ---------- STANDARD SELECTOR ---------- */
  .tabs{ display:flex; justify-content:center; gap:10px; margin:22px 0 6px; flex-wrap:wrap; }
  .tab-btn{
    font-family:var(--font-display); font-size:14px; font-weight:700;
    padding:11px 24px; border-radius:999px;
    color:var(--text-muted);
    background:rgba(255,255,255,0.04);
    border:1px solid rgba(255,255,255,0.12);
    cursor:pointer; transition:all .25s ease;
  }
  .tab-btn:hover{ color:var(--text-light); border-color:var(--accent-cyan); }
  .tab-btn.active{
    color:#05010f;
    background:linear-gradient(90deg, var(--accent-cyan), var(--accent-violet));
    border-color:transparent;
    box-shadow:0 0 22px rgba(34,211,238,0.45);
  }

  /* ---------- ORBIT ---------- */
  .orbit-wrap{ display:none; animation:fadeUp .5s ease both; }
  .orbit-wrap.active{ display:block; }
  .orbit-svg{ width:100%; height:auto; display:block; margin:0 auto; max-width:1000px; }

  .hub-circle{ animation:hubPulse 3s ease-in-out infinite; }
  .hub-label{ font-family:var(--font-display); font-weight:800; fill:#05010f; }
  .hub-sub{ font-family:var(--font-en); fill:#05010f; opacity:0.7; }

  .orbit-line{ animation:dashFlow 1.4s linear infinite; }

  .node-group{ cursor:pointer; animation:nodeIn .5s ease backwards; transition:transform .22s ease; }
  .node-group.disabled{ cursor:not-allowed; opacity:0.4; }
  .node-group:hover{ transform:scale(1.22); }
  .node-circle{ transition:r .18s ease, filter .18s ease; }
  .node-group:not(.disabled):hover .node-circle{ filter:drop-shadow(0 0 12px currentColor); }
  .node-group:not(.disabled):hover .node-label{ text-decoration:underline; }
  .node-tag{ font-family:var(--font-en); font-weight:700; pointer-events:none; }
  .node-label{ font-family:var(--font-tamil); font-size:15.5px; font-weight:600; fill:var(--text-light); cursor:pointer; }
  .node-medium{ font-family:var(--font-en); font-size:12px; fill:var(--text-muted); cursor:pointer; }
  .node-group.disabled .node-label,
  .node-group.disabled .node-medium{ cursor:not-allowed; }

  /* ---------- LEGEND ---------- */
  .legend{
    display:flex; justify-content:center; flex-wrap:wrap; gap:14px;
    margin:22px auto 6px; max-width:700px;
  }
  .legend-item{ display:flex; align-items:center; gap:6px; font-family:var(--font-en); font-size:11.5px; color:var(--text-muted); }
  .legend-dot{ width:9px; height:9px; border-radius:50%; }

  .panel-note{
    text-align:center; color:var(--text-muted); font-family:var(--font-en);
    font-size:11.5px; margin-top:18px; letter-spacing:0.3px;
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation-duration:0.001ms !important; animation-iteration-count:1 !important; transition-duration:0.001ms !important; }
  }
</style>
</head>

  function buildStarfield() {
    const field = document.getElementById("starfield");
    for (let i = 0; i < 90; i++) {
      const s = document.createElement("div");
      s.className = "star";
      s.style.left = Math.random() * 100 + "vw";
      s.style.top = Math.random() * 100 + "vh";
      s.style.width = s.style.height = (Math.random() * 1.8 + 1) + "px";
      s.style.animationDuration = (2 + Math.random() * 3) + "s";
      s.style.animationDelay = (Math.random() * 3) + "s";
      field.appendChild(s);
    }
  }

  function buildOrbit(standard) {
    const subjects = DATA[standard];
    const baseSize = 900;
    const hPad = 260;
    const width = baseSize + hPad * 2;
    const height = baseSize;
    const cx = width / 2, cy = height / 2;
    const R = baseSize * 0.33;
    const hubR = 52;
    const nodeR = 31;
    const n = subjects.length;

    let svg = `<svg class="orbit-svg" viewBox="0 0 ${width} ${height}" xmlns="http://www.w3.org/2000/svg">`;

    // faint orbit ring
    svg += `<circle cx="${cx}" cy="${cy}" r="${R}" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/>`;

    // lines + nodes
    let linesSvg = "", nodesSvg = "";
    subjects.forEach((subj, i) => {
      const angle = (Math.PI * 2 * i / n) - Math.PI / 2;
      const x = cx + R * Math.cos(angle);
      const y = cy + R * Math.sin(angle);
      const color = COLORS[subj.cat];
      const hasLink = subj.url && subj.url.trim().length > 0;
      const delay = (i * 0.05).toFixed(2);

      linesSvg += `<line class="orbit-line" x1="${cx}" y1="${cy}" x2="${x}" y2="${y}"
        stroke="${color}" stroke-width="1.4" stroke-opacity="${hasLink ? 0.35 : 0.15}"
        stroke-dasharray="5 6" style="animation-delay:${delay}s"/>`;

      // label placement outward
      const labelR = R + nodeR + 34;
      const lx = cx + labelR * Math.cos(angle);
      const ly = cy + labelR * Math.sin(angle);
      let anchor = "middle";
      if (Math.cos(angle) > 0.25) anchor = "start";
      else if (Math.cos(angle) < -0.25) anchor = "end";

      const nodeInner = `
        <circle class="node-circle" cx="${x}" cy="${y}" r="${nodeR}" fill="${hasLink ? color : '#3a3f55'}" style="color:${color}"/>
        <text class="node-tag" x="${x}" y="${y + 7}" text-anchor="middle" font-size="20" fill="#05010f">${subj.tag}</text>
        <text class="node-label" x="${lx}" y="${ly - 3}" text-anchor="${anchor}">${subj.name}</text>
        ${subj.medium ? `<text class="node-medium" x="${lx}" y="${ly + 15}" text-anchor="${anchor}">${hasLink ? subj.medium : 'COMING SOON'}</text>` : (!hasLink ? `<text class="node-medium" x="${lx}" y="${ly + 15}" text-anchor="${anchor}">COMING SOON</text>` : '')}
      `;

      if (hasLink) {
        nodesSvg += `<a xlink:href="${subj.url}" target="_blank" rel="noopener">
          <g class="node-group" style="animation-delay:${delay}s; transform-origin:${x}px ${y}px;">${nodeInner}</g>
        </a>`;
      } else {
        nodesSvg += `<g class="node-group disabled" style="animation-delay:${delay}s; transform-origin:${x}px ${y}px;">${nodeInner}</g>`;
      }
    });

    svg += linesSvg + nodesSvg;

    // hub
    svg += `
      <circle class="hub-circle" cx="${cx}" cy="${cy}" r="${hubR}" fill="url(#hubGrad${standard})"/>
      <text class="hub-label" x="${cx}" y="${cy - 2}" text-anchor="middle" font-size="24">${standard}th</text>
      <text class="hub-sub" x="${cx}" y="${cy + 16}" text-anchor="middle" font-size="10">STANDARD</text>
      <defs>
        <radialGradient id="hubGrad${standard}" cx="35%" cy="30%" r="75%">
          <stop offset="0%" stop-color="#ffffff"/>
          <stop offset="45%" stop-color="#22d3ee"/>
          <stop offset="100%" stop-color="#8b5cf6"/>
        </radialGradient>
      </defs>
    `;

    svg += `</svg>`;
    document.getElementById("orbit" + standard).innerHTML = svg;
  }

  function buildLegend() {
    const legend = document.getElementById("legend");
    legend.innerHTML = Object.keys(COLORS).map(cat => `
      <div class="legend-item">
        <span class="legend-dot" style="background:${COLORS[cat]}"></span>
        ${CAT_LABELS[cat]}
      </div>
    `).join("");
  }

  function showStandard(std) {
    ["12","11","10"].forEach(s => {
      document.getElementById("orbit" + s).classList.toggle("active", s === std);
      document.getElementById("tabBtn" + s).classList.toggle("active", s === std);
    });
  }
